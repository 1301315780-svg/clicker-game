<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taco Clicker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <h1>Taco Clicker</h1>
        
        <div class="score-display">
            <span>Tacos: </span>
            <span id="taco-count">0</span>
        </div>
        
        <div class="taco-section">
            <img id="taco-button" src="taco.jpg" alt="Click the taco!">
        </div>
        
   <div class="shop-section">
    <h2>Shop</h2>
    <button id="double-click-button">Double Click (Cost: 50 tacos)</button>
    <button id="triple-click-button" style="display: none;">Triple Click (Cost: 750 tacos)</button>
    <button id="auto-maker-button">Auto Taco Maker (Cost: 1000 tacos)</button>
    <button id="taco-factory-button">Taco Factory (Cost: 5000 tacos)</button>
    <button id="golden-taco-button">Golden Taco (Cost: 10000 tacos)</button>
</div>

    
    <script src="script.js"></script>
</body>
</html>
